# .github/workflows/ci.yml
# Secure CI Pipeline — GitHub Actions (Node.js)
# Stages:
#   1. Code Checkout
#   2. Code Build
#   3. SonarQube Scan
#   4. Black Duck Scan
#   5. Push Snapshot to Nexus
#   6. Build Docker Image
#   7. Trivy Docker Scan
#   8. Push Image to Docker Hub
#   9. UAT Deploy (manual approval gate)

name: Secure CI Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  IMAGE_NAME: ${{ github.repository }}   # e.g. org/repo → dockerhub image name

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1 — Code Checkout
  # ─────────────────────────────────────────────
  checkout:
    name: "① Code Checkout"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # Full history required for SonarQube blame data

      - name: Print commit info
        run: |
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Author : ${{ github.actor }}"

  # ─────────────────────────────────────────────
  # STAGE 2 — Code Build
  # ─────────────────────────────────────────────
  build:
    name: "② Code Build"
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build application
        run: npm run build

      - name: Run unit tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text
        env:
          CI: true

      - name: Coverage gate (≥80%)
        run: |
          COVERAGE=$(node -e "
            const fs = require('fs');
            const lcov = fs.readFileSync('coverage/lcov.info','utf8');
            const lf = lcov.match(/LF:(\d+)/g)||[];
            const lh = lcov.match(/LH:(\d+)/g)||[];
            const total = lf.reduce((s,l)=>s+parseInt(l.slice(3)),0);
            const hit   = lh.reduce((s,h)=>s+parseInt(h.slice(3)),0);
            console.log(total?((hit/total)*100).toFixed(1):0);
          ")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 80% gate."
            exit 1
          fi
          echo "✅ Coverage gate passed: ${COVERAGE}%"

      - name: Upload build & coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            coverage/lcov.info

  # ─────────────────────────────────────────────
  # STAGE 3 — SonarQube Code Scan (SAST)
  # ─────────────────────────────────────────────
  sonarqube:
    name: "③ SonarQube Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=src
            -Dsonar.tests=test
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────
  # STAGE 4 — Black Duck SCA Scan
  # ─────────────────────────────────────────────
  black-duck:
    name: "④ Black Duck Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: Run Black Duck Detect
        uses: synopsys-sig/detect-action@v1
        with:
          scan-mode: RAPID
          blackduck-url: ${{ secrets.BLACKDUCK_URL }}
          blackduck-api-token: ${{ secrets.BLACKDUCK_API_TOKEN }}
          detect-version: latest
          output-path-override: ${{ github.workspace }}/blackduck-output
        env:
          DETECT_BLACKDUCK_SCAN_FAILURE_SEVERITIES: "CRITICAL,HIGH"
          DETECT_PROJECT_NAME: ${{ github.event.repository.name }}
          DETECT_PROJECT_VERSION_NAME: ${{ github.sha }}
          DETECT_NPM_INCLUDE_DEV_DEPENDENCIES: false

      - name: Upload Black Duck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackduck-report
          path: blackduck-output/

  # ─────────────────────────────────────────────
  # STAGE 5 — Push Snapshot Artifact to Nexus
  # ─────────────────────────────────────────────
  nexus-publish:
    name: "⑤ Push Snapshot → Nexus"
    runs-on: ubuntu-latest
    needs: [sonarqube, black-duck]         # Both security gates must pass first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: ${{ secrets.NEXUS_NPM_REGISTRY }}  # e.g. https://nexus.example.com/repository/npm-snapshots/

      - run: npm ci --prefer-offline

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Stamp snapshot version
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SNAPSHOT_VERSION=$(node -p "require('./package.json').version")-SNAPSHOT.${SHORT_SHA}
          echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}" >> $GITHUB_ENV
          npm version ${SNAPSHOT_VERSION} --no-git-tag-version

      - name: Pack tarball
        run: npm pack

      - name: Publish to Nexus npm snapshot repo
        run: npm publish --registry ${{ secrets.NEXUS_NPM_REGISTRY }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}

  # ─────────────────────────────────────────────
  # STAGE 6 — Build Docker Image
  # ─────────────────────────────────────────────
  docker-build:
    name: "⑥ Build Docker Image"
    runs-on: ubuntu-latest
    needs: nexus-publish
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=snapshot-${{ steps.sha.outputs.short }}

      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar     # Save image to disk for Trivy scan

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  # ─────────────────────────────────────────────
  # STAGE 7 — Trivy Docker Image Scan
  # ─────────────────────────────────────────────
  trivy-scan:
    name: "⑦ Trivy Docker Scan"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: table
          exit-code: '1'                      # Fail build on findings
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH             # Block on CRITICAL and HIGH only
          output: trivy-report.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ─────────────────────────────────────────────
  # STAGE 8 — Push Image to Docker Hub
  # ─────────────────────────────────────────────
  docker-push:
    name: "⑧ Push Image → Docker Hub"
    runs-on: ubuntu-latest
    needs: trivy-scan                        # Only push if Trivy scan is clean
    steps:
      - uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:snapshot-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ─────────────────────────────────────────────
  # STAGE 9 — UAT Deploy (Manual Approval Gate)
  # ─────────────────────────────────────────────
  deploy-uat:
    name: "⑨ Deploy → UAT"
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: uat                              # Configure reviewers in GitHub → Settings → Environments → uat
      url: https://uat.example.com          # Shows as a live link in the GitHub Actions UI
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl (UAT)
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_UAT }}

      - name: Helm upgrade — UAT
        run: |
          helm upgrade --install app ./helm/app \
            --namespace uat \
            --create-namespace \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }} \
            --set image.tag=sha-${{ github.sha }} \
            --set replicaCount=1 \
            --wait --timeout 5m

      - name: UAT smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://uat.example.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ UAT smoke test failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ UAT deployment healthy — HTTP 200"
