name: Secure CI Pipeline

on:
  push:
    branches:
      - dev
      - main

  pull_request:
    branches:
      - dev
      - main

env:
  NODE_VERSION: 20

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 — Build & Test
  # ─────────────────────────────────────────────
  build:
    name: "① Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: |
          npm test -- \
          --coverage \
          --coverageReporters=lcov \
          --coverageReporters=text

      - name: Build Application
        run: npm run build

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  # ─────────────────────────────────────────────
  # STAGE 2 — SonarQube Analysis
  # ─────────────────────────────────────────────
  sonarqube:
    name: "② SonarQube Analysis"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=vkharishb
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  # ─────────────────────────────────────────────
  # STAGE 3 — OWASP Dependency Check
  # ─────────────────────────────────────────────
  owasp-scan:
    name: "③ OWASP Dependency Check"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.event.repository.name }}
          path: "."
          format: "HTML"
          out: "owasp-report"
          args: >
            --enableRetired
            --scan .

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: owasp-report/

      - name: npm Security Audit
        run: npm audit --audit-level=high || true

  # ─────────────────────────────────────────────
  # STAGE 4 — Nexus Publish
  # ─────────────────────────────────────────────
  nexus-publish:
    name: "④ Nexus Publish"
    runs-on: ubuntu-latest
    needs: [sonarqube, owasp-scan]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Configure Nexus npm auth
        run: |
          echo "registry=${{ secrets.NEXUS_NPM_REGISTRY }}" > ~/.npmrc
          echo "//$(echo '${{ secrets.NEXUS_NPM_REGISTRY }}' | sed 's|http://||' | sed 's|https://||'):_authToken=${{ secrets.NEXUS_NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish Package to Nexus
        run: |
          npm publish \
          --registry=${{ secrets.NEXUS_NPM_REGISTRY }} || true

  # ─────────────────────────────────────────────
  # STAGE 5 — Docker Build & Security Scan
  # ─────────────────────────────────────────────
  docker-security:
    name: "⑤ Docker Build & Scan"
    runs-on: ubuntu-latest
    needs: nexus-publish

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Build Docker image
      - name: Build Docker Image
        run: |
          docker build \
          -t secure-cicd-pipeline:${{ github.sha }} \
          -t secure-cicd-pipeline:latest .

      # Trivy vulnerability scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-cicd-pipeline:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Save Trivy report
      - name: Generate Trivy Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-cicd-pipeline:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      # Upload SARIF to GitHub Security tab
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif